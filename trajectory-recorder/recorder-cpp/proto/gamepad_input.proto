syntax = "proto3";

package recorder;

message GamepadState {
    uint32 timestamp = 1;
    uint32 gamepad_index = 2;
    
    // Buttons (bitmap)
    uint32 buttons = 3;
    
    // Triggers
    uint32 left_trigger = 4;
    uint32 right_trigger = 5;
    
    // Thumbsticks
    message ThumbStick {
        int32 x = 1;
        int32 y = 2;
    }
    
    ThumbStick left_thumb = 6;
    ThumbStick right_thumb = 7;
}

message GamepadRecording {
    repeated GamepadState states = 1;
}
